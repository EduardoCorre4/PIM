<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Abertura de Chamado</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>Abertura de Chamado para a JKE</h1>


    <!-- ======================================== -->
    <!-- FORMULÁRIO -->
    <!-- ======================================== -->

    <form id="form-chamado">


        <!-- EMPRESA -->
        <label for="nome">
            Nome da Empresa
        </label>

        <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Digite a razão social"
            required
        >


        <!-- BOTÃO BUSCAR -->
        <button
            type="button"
            id="btn-buscar-empresa"
        >
            Buscar Empresa
        </button>


        <!-- RESULTADO -->
        <div id="resultado-empresa"></div>


        <!-- CONTRATOS -->
        <div id="area-contratos" style="display: none;">

            <label for="contrato_select">
                Contratos ativos
            </label>

            <select
                id="contrato_select"
                required
            >

                <option value="">
                    Selecione um contrato
                </option>

            </select>

        </div>


        <!-- TITULO -->
        <label for="titulo">
            Título do Chamado
        </label>

        <input
            type="text"
            id="titulo"
            placeholder="Ex: Sistema fora do ar"
            required
        >


        <!-- DESCRIÇÃO -->
        <label for="descricao">
            Descrição do Problema
        </label>

        <textarea
            id="descricao"
            rows="6"
            placeholder="Descreva o problema detalhadamente"
            required
        ></textarea>


        <!-- PRIORIDADE -->
        <label for="prioridade">
            Prioridade
        </label>

        <select
            id="prioridade"
            required
        >

            <option value="">
                Selecione
            </option>

            <option value="BAIXA">
                BAIXA
            </option>

            <option value="MEDIA">
                MEDIA
            </option>

            <option value="ALTA">
                ALTA
            </option>

            <option value="CRITICA">
                CRITICA
            </option>

        </select>


        <!-- STATUS -->
        <input
            type="hidden"
            id="status_chamado"
            value="ABERTO"
        >


        <!-- DATA -->
        <label for="data_abertura">
            Data de abertura
        </label>

        <input
            type="datetime-local"
            id="data_abertura"
            readonly
        >


        <!-- BOTÕES -->
        <div class="submit-buttons">

            <button type="submit">
                Enviar
            </button>

            <button type="reset">
                Limpar
            </button>

        </div>

    </form>


    <!-- ======================================== -->
    <!-- BOTÃO VOLTAR -->
    <!-- ======================================== -->

    <div class="container-voltar">

        <button
            type="button"
            onclick="window.location.href='index.html'"
            class="btn-voltar"
        >
            Voltar para a tela inicial
        </button>

    </div>


    <!-- ======================================== -->
    <!-- LOGO -->
    <!-- ======================================== -->

    <figure>

        <img
            src="imagens/arte logo jke.png"
            alt="Logo JKE"
            class="logo"
        >

    </figure>


    <!-- ======================================== -->
    <!-- SCRIPT -->
    <!-- ======================================== -->

    <script>

        const formulario =
            document.getElementById('form-chamado');

        const btnBuscarEmpresa =
            document.getElementById('btn-buscar-empresa');

        const resultadoEmpresa =
            document.getElementById('resultado-empresa');

        const contratoSelect =
            document.getElementById('contrato_select');

        const areaContratos =
            document.getElementById('area-contratos');


        // ========================================
        // DATA AUTOMÁTICA
        // ========================================

        function atualizarData() {

            const agora = new Date();

            agora.setMinutes(
                agora.getMinutes() -
                agora.getTimezoneOffset()
            );

            document.getElementById(
                'data_abertura'
            ).value = agora
                .toISOString()
                .slice(0, 16);

        }

        atualizarData();


        // ========================================
        // BUSCAR EMPRESA
        // ========================================

        btnBuscarEmpresa.addEventListener(

            'click',

            async () => {

                const nome =
                    document.getElementById('nome').value;

                if (!nome) {

                    alert('Digite o nome da empresa');

                    return;

                }

                try {

                    const resposta = await fetch(

                        `http://localhost:3000/contratos/empresa/${nome}`

                    );

                    if (!resposta.ok) {

                        throw new Error();

                    }

                    const contratos =
                        await resposta.json();


                    if (contratos.length === 0) {

                        resultadoEmpresa.innerHTML = `

                            <p class="erro">
                                Empresa não encontrada
                            </p>

                        `;

                        areaContratos.style.display =
                            'none';

                        return;

                    }


                    resultadoEmpresa.innerHTML = `

                        <p class="sucesso">
                            Empresa encontrada
                        </p>

                    `;


                    contratoSelect.innerHTML = `

                        <option value="">
                            Selecione um contrato
                        </option>

                    `;


                    contratos.forEach(cto => {

                        const option =
                            document.createElement('option');

                        option.value =
                            cto.id_cto;

                        option.dataset.tipo =
                            cto.tipo_contrato;

                        option.textContent =

                            `Contrato #${cto.id_cto} | ${cto.tipo_contrato}`;

                        contratoSelect.appendChild(option);

                    });


                    areaContratos.style.display =
                        'block';

                }

                catch (erro) {

                    console.log(erro);

                    resultadoEmpresa.innerHTML = `

                        <p class="erro">
                            Erro ao buscar empresa
                        </p>

                    `;

                }

            }

        );


        // ========================================
        // ENVIAR CHAMADO
        // ========================================

        formulario.addEventListener(

            'submit',

            async (event) => {

                event.preventDefault();


                const contratoSelecionado =
                    contratoSelect.options[
                        contratoSelect.selectedIndex
                    ];


                const dados = {

                    nome:
                        document.getElementById('nome').value,

                    id_cto:
                        contratoSelect.value,

                    tipo_cto:
                        contratoSelecionado.dataset.tipo,

                    titulo:
                        document.getElementById('titulo').value,

                    descricao:
                        document.getElementById('descricao').value,

                    prioridade:
                        document.getElementById('prioridade').value,

                    status_chamado:
                        document.getElementById('status_chamado').value,

                    data_abertura:
                        document.getElementById('data_abertura').value

                };


                try {

                    const resposta = await fetch(

                        'http://localhost:3000/chamados/abrir',

                        {

                            method: 'POST',

                            headers: {

                                'Content-Type':
                                    'application/json'

                            },

                            body: JSON.stringify(dados)

                        }

                    );


                    const resultado =
                        await resposta.json();


                    alert(resultado.mensagem);


                    formulario.reset();

                    atualizarData();

                    areaContratos.style.display =
                        'none';

                    resultadoEmpresa.innerHTML =
                        '';

                }

                catch (erro) {

                    console.log(erro);

                    alert(
                        'Erro ao abrir chamado'
                    );

                }

            }

        );

    </script>

</body>

</html>
