<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel do Gerente</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>Painel do Gerente</h1>


    <!-- ======================================== -->
    <!-- CONSULTAR CONTRATO -->
    <!-- ======================================== -->

    <section>

        <h2>Consultar Contrato</h2>

        <label for="select_contrato">
            Selecionar contrato
        </label>

        <select id="select_contrato">

            <option value="">
                Carregando contratos...
            </option>

        </select>

        <button
            type="button"
            id="btn-buscar"
        >
            Buscar Contrato
        </button>

        <div id="dados-contrato"></div>

    </section>


    <!-- ======================================== -->
    <!-- CONSULTAR CHAMADOS -->
    <!-- ======================================== -->

    <section>

        <h2>Consultar Chamados</h2>

        <label for="filtro_status">
            Filtrar por status
        </label>

        <select id="filtro_status">

            <option value="ABERTO">
                ABERTO
            </option>

            <option value="EM ANDAMENTO">
                EM ANDAMENTO
            </option>

            <option value="FECHADO">
                FECHADO
            </option>

        </select>

        <button
            type="button"
            id="btn-buscar-chamados"
        >
            Buscar Chamados
        </button>

        <div id="lista-chamados"></div>

    </section>


    <!-- ======================================== -->
    <!-- EDITAR CONTRATO -->
    <!-- ======================================== -->

    <form id="form-contrato">

        <h2>Editar Contrato</h2>

        <label for="id_cto">
            ID do contrato
        </label>

        <input
            type="number"
            id="id_cto"
            readonly
        >

        <label for="status_contrato">
            Status
        </label>

        <select id="status_contrato">

            <option value="ATIVO">
                ATIVO
            </option>

            <option value="SUSPENSO">
                SUSPENSO
            </option>

            <option value="ENCERRADO">
                ENCERRADO
            </option>

        </select>

        <label for="data_fim">
            Data final
        </label>

        <input
            type="date"
            id="data_fim"
        >

        <button type="submit">
            Atualizar Contrato
        </button>

    </form>


    <!-- ======================================== -->
    <!-- CONFIGURAÇÕES -->
    <!-- ======================================== -->

    <form id="form-configuracoes">

        <h2>Configurações do Contrato</h2>

        <label for="tipo_edicao">
            Tipo do contrato
        </label>

        <select id="tipo_edicao">

            <option value="">
                Selecione
            </option>

            <option value="SP">
                SP
            </option>

            <option value="SI">
                SI
            </option>

            <option value="CS">
                CS
            </option>

        </select>

        <div id="campos-gerente"></div>

        <button type="submit">
            Salvar Configurações
        </button>

    </form>


    <!-- ======================================== -->
    <!-- EDITAR CHAMADO -->
    <!-- ======================================== -->

    <form id="form-chamado">

        <h2>Editar Chamado</h2>

        <label for="id_chamado">
            ID do chamado
        </label>

        <input
            type="number"
            id="id_chamado"
            min="1"
        >

        <label for="status_chamado">
            Status
        </label>

        <select id="status_chamado">

            <option value="ABERTO">
                ABERTO
            </option>

            <option value="EM ANDAMENTO">
                EM ANDAMENTO
            </option>

            <option value="FECHADO">
                FECHADO
            </option>

        </select>

        <button type="submit">
            Atualizar Chamado
        </button>

    </form>


    <!-- ======================================== -->
    <!-- BOTÃO VOLTAR -->
    <!-- ======================================== -->

    <div class="container-voltar">

        <button
            type="button"
            onclick="window.location.href='index.html'"
            class="btn-voltar"
        >
            Voltar para a tela inicial
        </button>

    </div>


    <!-- ======================================== -->
    <!-- LOGO -->
    <!-- ======================================== -->

    <img
        src="imagens/arte logo jke.png"
        alt="Logo JKE"
        class="logo"
    >


    <!-- ======================================== -->
    <!-- SCRIPT -->
    <!-- ======================================== -->

    <script>

        const selectContrato =
            document.getElementById('select_contrato');

        const dadosContrato =
            document.getElementById('dados-contrato');

        const tipoEdicao =
            document.getElementById('tipo_edicao');

        const camposGerente =
            document.getElementById('campos-gerente');

        const listaChamados =
            document.getElementById('lista-chamados');

        const filtroStatus =
            document.getElementById('filtro_status');


        // ========================================
        // CARREGAR CONTRATOS
        // ========================================

        async function carregarContratos() {

            try {

                const resposta = await fetch(
                    'http://localhost:3000/contratos'
                );

                const contratos =
                    await resposta.json();

                selectContrato.innerHTML =
                    '<option value="">Selecione</option>';

                contratos.forEach(cto => {

                    const option =
                        document.createElement('option');

                    option.value =
                        cto.id_cto;

                    option.textContent =
                        `#${cto.id_cto} - ${cto.empresa}`;

                    selectContrato.appendChild(option);

                });

            }

            catch (erro) {

                console.log(erro);

                alert('Erro ao carregar contratos');

            }

        }

        carregarContratos();


        // ========================================
        // BUSCAR CONTRATO
        // ========================================

        document
            .getElementById('btn-buscar')
            .addEventListener('click', async () => {

                const id =
                    selectContrato.value;

                if (!id) {

                    alert('Selecione um contrato');

                    return;

                }

                try {

                    const resposta = await fetch(
                        `http://localhost:3000/contratos/${id}`
                    );

                    const contrato =
                        await resposta.json();

                    dadosContrato.innerHTML = `

                        <div class="card-chamado">

                            <h3>
                                Dados do Contrato
                            </h3>

                            <p>
                                <strong>ID:</strong>
                                ${contrato.id_cto}
                            </p>

                            <p>
                                <strong>Empresa:</strong>
                                ${contrato.empresa}
                            </p>

                            <p>
                                <strong>Tipo:</strong>
                                ${contrato.tipo_contrato}
                            </p>

                            <p>
                                <strong>Status:</strong>
                                ${contrato.status_contrato}
                            </p>

                            <p>
                                <strong>Valor:</strong>
                                R$ ${contrato.valor}
                            </p>

                        </div>

                    `;

                    document.getElementById('id_cto').value =
                        contrato.id_cto;

                    document.getElementById('status_contrato').value =
                        contrato.status_contrato;

                    document.getElementById('data_fim').value =
                        contrato.data_fim
                            ? contrato.data_fim.split('T')[0]
                            : '';

                    tipoEdicao.value =
                        contrato.tipo_contrato;

                    carregarCampos(
                        contrato.tipo_contrato
                    );

                }

                catch (erro) {

                    console.log(erro);

                    alert('Erro ao buscar contrato');

                }

            });


        // ========================================
        // CAMPOS DINÂMICOS
        // ========================================

        function carregarCampos(tipo) {

            camposGerente.innerHTML = '';

            if (tipo === 'SP') {

                camposGerente.innerHTML = `

                    <label>
                        SLA
                    </label>

                    <input
                        type="number"
                        id="sla_horas"
                    >

                    <label>

                        <input
                            type="checkbox"
                            id="suporte_24h"
                        >

                        Suporte 24h

                    </label>

                `;

            }

            else if (tipo === 'SI') {

                camposGerente.innerHTML = `

                    <label>
                        Quantidade de usuários
                    </label>

                    <input
                        type="number"
                        id="quantidade_usuarios"
                    >

                    <label>

                        <input
                            type="checkbox"
                            id="possui_backup"
                        >

                        Possui backup

                    </label>

                `;

            }

            else if (tipo === 'CS') {

                camposGerente.innerHTML = `

                    <label>
                        Nível de segurança
                    </label>

                    <select id="nivel_seguranca">

                        <option value="BAIXO">
                            BAIXO
                        </option>

                        <option value="MEDIO">
                            MEDIO
                        </option>

                        <option value="ALTO">
                            ALTO
                        </option>

                        <option value="CRITICO">
                            CRITICO
                        </option>

                    </select>

                    <label>

                        <input
                            type="checkbox"
                            id="monitoramento"
                        >

                        Monitoramento

                    </label>

                `;

            }

        }

        tipoEdicao.addEventListener('change', () => {

            carregarCampos(
                tipoEdicao.value
            );

        });


        // ========================================
        // LISTAR CHAMADOS
        // ========================================

        async function carregarChamados() {

            const status =
                filtroStatus.value;

            try {

                const resposta = await fetch(

                    `http://localhost:3000/chamados/status/${encodeURIComponent(status)}`

                );

                const chamados =
                    await resposta.json();

                listaChamados.innerHTML = '';

                if (chamados.length === 0) {

                    listaChamados.innerHTML = `

                        <p>
                            Nenhum chamado encontrado
                        </p>

                    `;

                    return;

                }

                chamados.forEach(chamado => {

                    listaChamados.innerHTML += `

                        <div class="card-chamado">

                            <h3>
                                Chamado #${chamado.id_chamado}
                            </h3>

                            <p>
                                <strong>Contrato:</strong>
                                ${chamado.id_cto}
                            </p>

                            <p>
                                <strong>Título:</strong>
                                ${chamado.titulo}
                            </p>

                            <p>
                                <strong>Prioridade:</strong>
                                ${chamado.prioridade}
                            </p>

                            <p>
                                <strong>Status:</strong>
                                ${chamado.status_chamado}
                            </p>

                        </div>

                    `;

                });

            }

            catch (erro) {

                console.log(erro);

                alert('Erro ao carregar chamados');

            }

        }


        document
            .getElementById('btn-buscar-chamados')
            .addEventListener('click', carregarChamados);


        // ========================================
        // ATUALIZAR CONTRATO
        // ========================================

        document
            .getElementById('form-contrato')
            .addEventListener('submit', async (e) => {

                e.preventDefault();

                const id =
                    document.getElementById('id_cto').value;

                const dados = {

                    status_contrato:
                        document.getElementById('status_contrato').value,

                    data_fim:
                        document.getElementById('data_fim').value

                };

                try {

                    await fetch(

                        `http://localhost:3000/gerente/contrato/${id}`,

                        {

                            method: 'PUT',

                            headers: {
                                'Content-Type':
                                    'application/json'
                            },

                            body: JSON.stringify(dados)

                        }

                    );

                    alert(
                        'Contrato atualizado com sucesso!'
                    );

                }

                catch (erro) {

                    console.log(erro);

                    alert(
                        'Erro ao atualizar contrato'
                    );

                }

            });


        // ========================================
        // ATUALIZAR CHAMADO
        // ========================================

        document
            .getElementById('form-chamado')
            .addEventListener('submit', async (e) => {

                e.preventDefault();

                const id =
                    document.getElementById('id_chamado').value;

                const dados = {

                    status_chamado:
                        document.getElementById('status_chamado').value

                };

                try {

                    await fetch(

                        `http://localhost:3000/gerente/chamado/${id}`,

                        {

                            method: 'PUT',

                            headers: {
                                'Content-Type':
                                    'application/json'
                            },

                            body: JSON.stringify(dados)

                        }

                    );

                    alert(
                        'Chamado atualizado com sucesso!'
                    );

                }

                catch (erro) {

                    console.log(erro);

                    alert(
                        'Erro ao atualizar chamado'
                    );

                }

            });

    </script>

</body>

</html>
